name: Daily Web Scraper

on:
  schedule:
    # Rulează în fiecare zi la ora 02:00 UTC (ajustează după nevoie)
    - cron: '0 2 * * *'
  # Permite rularea manuală din interfața GitHub
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run scraping script
        run: python scrape.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[action]@users.noreply.github.com"
          
          # Adăugăm fișierul CSV generat/modificat
          git add output.csv
          
          # Facem commit doar dacă există schimbări (pentru a evita erori dacă scriptul nu a modificat fișierul)
          git commit -m "Automated data scrape: $(date)" || echo "No changes to commit"
          
          # Împingem modificările înapoi în repository
          git push
